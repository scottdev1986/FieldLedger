name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "26.5.0"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: "10.0.301"
          global-json-file: global.json
      - run: dotnet restore FieldLedger.slnx
      - run: dotnet build FieldLedger.slnx --configuration Release --no-restore
      - run: dotnet test FieldLedger.slnx --configuration Release --no-build --verbosity normal

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Validate migration placeholders
        run: test -d db/migrations && test -d db/rls
      - name: Future RLS policy tests
        run: echo "TODO: run migrations and RLS policy assertions after Phase 1."
